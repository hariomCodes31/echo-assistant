<div class="gaming-core-hud" style="position:relative; width:100%; font-family:var(--font-primary); color:#00FF00;">
    <p class="panel-title" style="margin-bottom:15px; font-weight:700; color:#00FF00; letter-spacing:1px;">PERFORMANCE OVERLAYS</p>

    <!-- GPU STATE -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div style="display:flex; align-items:center; gap:8px;">
            <span style="width:6px; height:6px; background:#00FF00; border-radius:50%; display:inline-block;"></span>
            <span style="font-size:0.75rem; color:#94A3B8;">GPU ENGINE</span>
        </div>
        <div style="font-size:0.75rem; font-weight:700; color:#00FF00; text-shadow:0 0 6px rgba(0,255,0,0.4);">OVERCLOCKED // 2240MHz</div>
    </div>

    <!-- FPS STATUS -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div style="display:flex; align-items:center; gap:8px;">
            <span style="width:6px; height:6px; background:#00FF00; border-radius:50%; display:inline-block;"></span>
            <span style="font-size:0.75rem; color:#94A3B8;">FRAME RATE</span>
        </div>
        <div style="font-size:0.75rem; font-weight:700; color:#3B82F6; text-shadow:0 0 6px rgba(59,130,246,0.4);">240 FPS NOMINAL</div>
    </div>

    <!-- COOLING SYSTEM -->
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <div style="display:flex; align-items:center; gap:8px;">
            <span style="width:6px; height:6px; background:#3B82F6; border-radius:50%; display:inline-block;"></span>
            <span style="font-size:0.75rem; color:#94A3B8;">FAN SPEED</span>
        </div>
        <div style="font-size:0.75rem; font-weight:700; color:#3B82F6;">80% COOLING</div>
    </div>

    <!-- Sparkline graphic in razer green -->
    <div style="height:25px; width:100%; margin-bottom:15px; background:rgba(0,255,0,0.06); border:1px solid rgba(0,255,0,0.15); overflow:hidden;">
        <svg width="100%" height="25" viewBox="0 0 140 25" style="overflow:visible;" preserveAspectRatio="none">
            <path d="M 0,20 L 10,12 L 20,20 L 30,12 L 40,20 L 50,5 L 60,18 L 80,18 L 90,8 L 110,20 L 140,5"
                  fill="none" stroke="#00ff00" stroke-width="1.5"
                  style="filter: drop-shadow(0 0 4px #00ff00);"/>
        </svg>
    </div>

    <!-- Stabilizer bar -->
    <div>
        <div style="font-size:0.65rem; display:flex; justify-content:space-between; margin-bottom:5px; color:#94A3B8;">
            <span>MEMORY BANDWIDTH</span>
            <span style="color:#00FF00; font-weight:600;">99.1%</span>
        </div>
        <div style="width:100%; height:6px; background:rgba(0,0,0,0.5); border:1px solid rgba(0,255,0,0.2); overflow:hidden; position:relative;">
            <div style="width:99.1%; height:100%; background:#00FF00;"></div>
        </div>
    </div>
</div>
