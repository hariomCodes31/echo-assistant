<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    body {
        background: transparent;
        margin: 0; padding: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
        font-family: monospace;
    }
    .core-shell {
        position: relative;
        width: 320px;
        height: 320px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #00ff33;
        font-size: 1.1rem;
        text-shadow: 0 0 8px #00ff33;
    }
    /* Pulsing matrix bracket box */
    .terminal-box {
        border: 1px solid #00ff33;
        background: rgba(0, 0, 0, 0.95);
        box-shadow: 0 0 15px rgba(0, 255, 51, 0.4);
        padding: 24px;
        border-radius: 0;
        text-align: center;
        animation: box-breathe 2s ease-in-out infinite;
    }
    
    .status-text {
        font-size: 0.85rem;
        margin-top: 10px;
        border-top: 1px dashed rgba(0, 255, 51, 0.3);
        padding-top: 10px;
        text-transform: uppercase;
    }
    
    .matrix-dot {
        display: inline-block;
        width: 8px; height: 8px;
        background: #00ff33;
        box-shadow: 0 0 8px #00ff33;
        margin-left: 5px;
    }

    .core-idle      .terminal-box { animation-duration: 2.5s; }
    .core-listening .terminal-box { animation-duration: 0.8s; border-color: #ffffff; color: #ffffff; text-shadow: 0 0 10px #ffffff; }
    .core-processing .terminal-box { animation: box-glitch 0.3s steps(2) infinite; }
    .core-speaking  .terminal-box { animation: box-vibrate 0.15s infinite; }

    @keyframes box-breathe {
        0%, 100% { transform: scale(1.0); opacity: 0.8; }
        50% { transform: scale(1.04); opacity: 1.0; }
    }
    @keyframes box-glitch {
        0%, 100% { transform: scale(1.0) skewX(-4deg); opacity: 0.9; }
        50% { transform: scale(1.08) skewX(4deg); opacity: 1.0; }
    }
    @keyframes box-vibrate {
        0%, 100% { transform: translate(0, 0) scale(1.02); }
        33% { transform: translate(-1px, 1px) scale(0.98); }
        66% { transform: translate(1px, -1px) scale(1.03); }
    }
</style>
</head>
<body>
<div class="core-shell {state}">
    <div class="terminal-box">
        <div>[ ECHO_CORE_v2.0 ]</div>
        <div style="font-size:2rem; margin: 12px 0; font-weight:bold;">&lt; X &gt;</div>
        <div class="status-text">
            <span>STATE: {state}</span>
            <span class="matrix-dot"></span>
        </div>
    </div>
</div>
</body>
</html>
