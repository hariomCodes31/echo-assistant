<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    body {
        background: transparent;
        margin: 0; padding: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
    }
    .core-shell {
        position: relative;
        width: 320px;
        height: 320px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    /* Pulsing White Orb */
    .white-orb {
        width: 84px;
        height: 84px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffffff 0%, #cbd5e1 55%, #64748b 100%);
        box-shadow: 
            0 0 25px rgba(255,255,255,0.75),
            0 0 50px rgba(255,255,255,0.4),
            0 0 80px rgba(255,255,255,0.2),
            inset 0 0 15px rgba(255,255,255,0.4);
        animation: orb-breathe 4s ease-in-out infinite;
        position: relative;
        z-index: 2;
    }
    
    /* Outward floating glowing rings */
    .glowing-ring {
        position: absolute;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.02), 0 0 15px rgba(255, 255, 255, 0.02);
        animation: ring-pulse 3s infinite linear;
    }
    .ring-1 { width: 130px; height: 130px; animation-duration: 4s; }
    .ring-2 { width: 180px; height: 180px; animation-duration: 6s; animation-delay: 1.5s; }
    .ring-3 { width: 230px; height: 230px; animation-duration: 8s; animation-delay: 3s; }

    /* Dot indicator on bottom */
    .state-dot {
        position: absolute;
        bottom: 25px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 0 8px #ffffff;
        animation: pulse-dot 2s infinite ease-in-out;
        z-index: 5;
    }

    /* Speed and animations per state */
    .core-idle      .white-orb { animation-duration: 4.0s; }
    .core-listening .white-orb { animation-duration: 1.2s; box-shadow: 0 0 35px rgba(255,255,255,0.95), 0 0 70px rgba(255,255,255,0.6); }
    .core-processing .white-orb { animation: orb-process 0.6s infinite ease-in-out; }
    .core-speaking  .white-orb { animation: orb-speak 0.25s infinite ease-in-out; }

    @keyframes orb-breathe {
        0%, 100% { transform: scale(1.0); opacity: 0.9; }
        50% { transform: scale(1.06); opacity: 1.0; }
    }
    @keyframes orb-process {
        0%, 100% { transform: scale(1.0); filter: brightness(1); }
        50% { transform: scale(1.1); filter: brightness(1.25); }
    }
    @keyframes orb-speak {
        0%, 100% { transform: scale(1.0) translate(0, 0); }
        50% { transform: scale(1.04) translate(1px, -1px); }
    }
    @keyframes ring-pulse {
        0% { transform: rotate(0deg) scale(0.92); opacity: 0.1; }
        50% { opacity: 0.35; }
        100% { transform: rotate(360deg) scale(1.08); opacity: 0.1; }
    }
    @keyframes pulse-dot {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1.0; }
    }
</style>
</head>
<body>
<div class="core-shell {state}">
    <div class="glowing-ring ring-1"></div>
    <div class="glowing-ring ring-2"></div>
    <div class="glowing-ring ring-3"></div>
    <div class="white-orb"></div>
    <div class="state-dot"></div>
</div>
</body>
</html>
