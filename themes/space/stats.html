<div class="space-core-hud" style="position:relative; width:100%; font-family:var(--font-primary); color:#3B82F6;">

            <span style="font-family:var(--font-mono); font-size:0.7rem; color:#94A3B8;">MISSION PHASE</span>

        <div style="font-family:var(--font-mono); font-size:0.75rem; font-weight:700; color:#3B82F6;">0 // 0ms DELAY</div>

    <!-- Stabilizer bar -->
    <div>

        </div>
        <div style="width:100%; height:6px; background:rgba(0,0,0,0.4); border:1px solid rgba(59,130,246,0.2); overflow:hidden; position:relative;">
