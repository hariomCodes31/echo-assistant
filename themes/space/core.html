<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
    body {
        background: transparent;
        margin: 0; padding: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
        color: #3b82f6;
    }
    .core-shell {
        position: relative;
        width: 320px;
        height: 320px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    /* Outer orbit ring */
    .orbit-ring {
        position: absolute;
        border: 1px solid rgba(59, 130, 246, 0.2);
        border-radius: 50%;
        animation: spin-cw 20s linear infinite;
    }
    .ring-1 { width: 220px; height: 220px; border-style: dashed; }
    .ring-2 { width: 160px; height: 160px; }
    
    /* Radar sweep line */
    .radar-sweep {
        position: absolute;
        width: 220px; height: 220px;
        border-radius: 50%;
        background: conic-gradient(from 0deg, rgba(59, 130, 246, 0.15) 0deg, transparent 90deg, transparent 360deg);
        animation: spin-cw 3s linear infinite;
    }
    
    /* Central globe/planet vector */
    .space-globe {
        position: absolute;
        width: 80px; height: 80px;
        border: 2px solid #3b82f6;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffffff 0%, #3b82f6 50%, #050814 100%);
        box-shadow: 
            0 0 25px rgba(59, 130, 246, 0.6),
            inset 0 0 12px rgba(255, 255, 255, 0.4);
        animation: globe-pulse 3s ease-in-out infinite;
        z-index: 5;
    }
    
    /* Crosshairs overlay */
    .crosshairs {
        position: absolute;
        width: 240px; height: 240px;
        border: 1px solid rgba(59, 130, 246, 0.1);
        border-radius: 50%;
    }
    .crosshairs::before, .crosshairs::after {
        content: "";
        position: absolute;
        background: rgba(59, 130, 246, 0.15);
    }
    .crosshairs::before { top: 50%; left: 0; width: 100%; height: 1px; }
    .crosshairs::after { left: 50%; top: 0; height: 100%; width: 1px; }

    .core-idle      .radar-sweep { animation-duration: 3s; }
    .core-listening .radar-sweep { animation-duration: 1s; }
    .core-processing .radar-sweep { animation: spin-cw 0.3s linear infinite; }
    .core-speaking  .radar-sweep { animation: spin-cw 0.6s linear infinite; }

    .core-listening  .space-globe { box-shadow: 0 0 40px #3b82f6; }
    .core-processing .space-globe { animation: flicker 0.25s infinite; }
    .core-speaking   .space-globe { animation: speak-vibe 0.15s infinite; }

    @keyframes spin-cw {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    @keyframes globe-pulse {
        0%, 100% { transform: scale(1.0); }
        50% { transform: scale(1.04); }
    }
    @keyframes flicker {
        0%, 100% { opacity: 0.7; transform: scale(1.02); }
        50% { opacity: 1.0; transform: scale(1.08); }
    }
    @keyframes speak-vibe {
        0%, 100% { transform: translate(0, 0) scale(1.03); }
        50% { transform: translate(-1px, 1px) scale(0.98); }
    }
</style>
</head>
<body>
<div class="core-shell {state}">
    <div class="crosshairs"></div>
    <div class="orbit-ring ring-1"></div>
    <div class="orbit-ring ring-2"></div>
    <div class="radar-sweep"></div>
    <div class="space-globe"></div>
</div>
</body>
</html>
